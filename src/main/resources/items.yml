# DeltaForceStrike - 物品配置
# 服务器运行目录: plugins/DeltaForceStrike/items.yml（需同步后 /dfs reload）

items:

  weapons:

    standard:
      name: "§f标准"
      type: melee
      material: WOODEN_SWORD
      price: 0
      slot: melee

    dragon:
      name: "§b游龙"
      type: melee
      material: IRON_SWORD
      price: 800
      slot: melee
      enchantments:
        sharpness: 3

    revolt:
      name: "§6逆战"
      type: melee
      material: GOLDEN_AXE
      price: 1400
      slot: melee
      # 4 点耐久（每次有效攻击扣 2 → 约两刀）
      max-durability: 4
      # 属性固定攻击伤害 18
      attack-damage: 18
      # 攻击间隔 5 秒（攻速约 0.2/s）
      attack-speed: 0.2

    dominator:
      name: "§3主宰"
      type: melee
      material: DIAMOND_SWORD
      price: 2900
      slot: melee
      attack-damage: 11
      attack-speed: 1.25

    frenzy:
      name: "§c狂袭"
      type: melee
      material: DIAMOND_AXE
      price: 3700
      slot: melee
      attack-damage: 16
      attack-speed: 0.75

    light-bow:
      name: "§f轻弓"
      type: ranged
      material: BOW
      price: 500
      slot: ranged
      enchantments:
        power: 2

    battle-crossbow:
      name: "§f霰弹战弩"
      type: ranged
      material: CROSSBOW
      price: 1200
      slot: ranged
      enchantments:
        quick_charge: 2
        multishot: 1
        piercing: 1
        unbreaking: 2

    assault-bow:
      name: "§b强袭弓"
      type: ranged
      material: BOW
      price: 1400
      slot: ranged
      enchantments:
        power: 4

    rapid-crossbow:
      name: "§b连发弩"
      type: ranged
      material: CROSSBOW
      price: 2400
      slot: ranged
      enchantments:
        quick_charge: 3
        piercing: 3
        unbreaking: 3

    hunting-bow:
      name: "§c猎杀弓"
      type: ranged
      material: BOW
      price: 4500
      slot: ranged
      enchantments:
        power: 6

  equipments:

    # 轻型 = 锁链甲（id 保留 leather-armor 兼容商店）
    leather-armor:
      name: "§a轻型护甲"
      type: armor
      price: 650
      kind: armor_set
      armor:
        helmet: CHAINMAIL_HELMET
        chestplate: CHAINMAIL_CHESTPLATE
        leggings: CHAINMAIL_LEGGINGS
        boots: CHAINMAIL_BOOTS

    chain-armor:
      name: "§a轻型护甲"
      type: armor
      price: 650
      kind: armor_set
      armor:
        helmet: CHAINMAIL_HELMET
        chestplate: CHAINMAIL_CHESTPLATE
        leggings: CHAINMAIL_LEGGINGS
        boots: CHAINMAIL_BOOTS

    iron-armor:
      name: "§f重型护甲"
      type: armor
      price: 1000
      kind: armor_set
      # 整套合计 +4 盔甲韧性（胸甲承载）；每件会写回原版护甲值，避免被属性覆盖吞掉
      armor-toughness: 4
      armor:
        helmet: IRON_HELMET
        chestplate: IRON_CHESTPLATE
        leggings: IRON_LEGGINGS
        boots: IRON_BOOTS

    shield:
      name: "§b守护"
      type: shield
      material: SHIELD
      price: 0
      slot: shield
      undroppable: true

  grenades:

    smoke:
      name: "§7烟雾弹"
      type: utility
      material: FIREWORK_STAR
      price: 300
      action: smoke
      slot: utility

    incendiary:
      name: "§6高爆火焰弹"
      type: utility
      material: FIRE_CHARGE
      price: 200
      action: explosion_fire
      slot: utility

    wither:
      name: "§8凋零手雷"
      type: utility
      material: WITHER_SKELETON_SKULL
      price: 500
      action: wither
      slot: utility

  bomb:

    plant-bomb:
      name: "§c改造TNT"
      type: bomb
      material: TNT
      price: 0
      action: plant
      slot: bomb
      undroppable: false

    bomb:

      plant-bomb:
        name: "§c改造TNT"
        type: bomb
        material: TNT
        price: 0
        action: plant
        slot: bomb
        undroppable: false

      defuse-kit:
        name: "§e拆除钳"
        type: defuse          # 不要用 utility，避免进道具槽逻辑
        material: SHEARS
        price: 300
        action: defuse
        slot: bomb            # 与 C4 同一槽（热键第 3 格）


  skill-charge:

    charge:
      name: "§d技能充能"
      type: skill_charge
      material: AMETHYST_SHARD
      price: 400
      action: skill_charge
